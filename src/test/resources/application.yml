spring:
  config:
    import: optional:dotenv:.env
  datasource:
    url: jdbc:h2:mem:dairydb
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true

app:
  jwt:
    secret: test-secret-key-for-unit-tests-only
    expiration-minutes: 15
    refresh-expiration-days: 7
